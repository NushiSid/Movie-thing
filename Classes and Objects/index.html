<html>
    <head>
        <title>
            Movie Database App
        </title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" />
        <link rel="stylesheet" href="https://bootswatch.com/4/yeti/bootstrap.min.css" />
        
    </head>
    <body>
        <div class="container mt-4">
        <h1 class="text-center">
            <i class="fas fa-video" style="color:rgb(128, 70, 255)"></i> Movie Database List
        </h1>
        <form id="frm">
            <div class="form-group">
                <h4>
                    Title
                </h4>
                <input class="form-control" id="ttl">
                
            </div>
            <div class="form-group">
                <h4>
                    Director
                </h4>
                <input class="form-control" id="drctr">
                
            </div>
            <div class="form-group">
                <h4>
                    Year
                </h4>
                <input class="form-control" id="yr">
                
            </div>
            <input type="submit" class="btn-block btn btn-primary">
        </form>
        <table class="table table-triped mt-5"> 
            <thead>
                <tr>
                    <th>
                        Title
                    </th>
                    <th>
                        Director
                    </th>
                    <th>
                        Year
                    </th>
                </tr>
            </thead>
            <tbody id="ml">
                
            </tbody>
        </table>
    </div>
    <script src="movies.js"></script>
    </body>
</html>
